<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO Studio Suite - Pro</title>
    <style>
        :root {
            --primary: #ffcf00;
            --primary-hover: #e6bc00;
            --bg-dark: #0f0f0f;
            --panel-bg: #1e1e1e;
            --nav-bg: #151515;
            --border-color: #333;
            --text-main: #e0e0e0;
            --text-dim: #999;
            --bg-loading: #0b0b0e;
        }

        /* --- GLOBAL HEADER (NAVIGATION) --- */
        .global-header {
            background: var(--nav-bg);
            height: 45px;
            display: flex;
            align-items: center;
            padding: 0 25px;
            border-bottom: 1px solid #000;
            gap: 30px;
        }

        .nav-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.75em;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link:hover { color: white; }
        .nav-link.active { color: var(--primary); }
        .nav-link.active::before {
            content: "●";
            font-size: 8px;
        }

        /* --- ÉCRAN DE CHARGEMENT --- */
        #loader-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-loading);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, visibility 1s;
        }

        .loading-container {
            display: grid;
            grid-template-columns: repeat(20, 25px);
            grid-template-rows: repeat(12, 25px);
            gap: 2px;
            padding: 30px;
            position: relative;
        }

        .dot {
            width: 25px; height: 25px;
            position: relative; opacity: 0; transform: scale(0);
            animation: legoPop 6s forwards ease-in-out;
        }

        @keyframes legoPop {
            0% { transform: scale(0) translateY(-30px); opacity: 0; filter: blur(10px); }
            5% { transform: scale(1.1) translateY(0); opacity: 1; filter: blur(0); }
            10% { transform: scale(1); opacity: 1; }
            80% { transform: scale(1); opacity: 1; filter: blur(0); }
            90% { transform: scale(0.3); opacity: 0; filter: blur(8px); }
            100% { transform: scale(0); opacity: 0; filter: blur(15px); }
        }

        /* --- INTERFACE PRINCIPALE --- */
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden;
        }

        .toolbar { 
            background: var(--panel-bg); padding: 0 25px; height: 65px;
            display: flex; gap: 25px; align-items: center; 
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 10;
        }

        .logo { font-size: 1.1em; font-weight: 800; letter-spacing: 1px; color: white; }
        .logo span { color: var(--primary); }

        .btn {
            background: #333; border: 1px solid #444; color: white;
            padding: 8px 16px; border-radius: 6px; font-size: 0.85em;
            cursor: pointer; transition: all 0.2s;
        }

        .btn:hover { background: #444; border-color: var(--primary); }
        .btn-primary { background: var(--primary); color: #000; font-weight: bold; border: none; }

        .main-content { display: flex; flex: 1; overflow: hidden; }

        .settings { 
            width: 320px; background: var(--panel-bg); padding: 25px; 
            overflow-y: auto; border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; gap: 20px;
        }

        .control-group { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-size: 0.75em; margin-bottom: 8px; color: var(--text-dim); font-weight: 600; }
        label span { color: var(--primary); font-family: monospace; }

        select, input[type="range"] { width: 100%; accent-color: var(--primary); }
        select { background: #111; color: white; border: 1px solid #444; padding: 10px; border-radius: 6px; }

        .viewer { flex: 1; display: flex; justify-content: center; align-items: center; gap: 40px; background: #0a0a0a; padding: 40px; }
        .canvas-label { margin-bottom: 15px; color: var(--text-dim); font-size: 0.7em; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; text-align: center;}
        canvas { background: #fff; box-shadow: 0 20px 60px rgba(0,0,0,0.6); border-radius: 4px; }

        .inventory-card { background: #111; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .inventory-card b { color: var(--primary); }

        /* FORMES LEGO LOADER */
        .square { border-radius: 2px; }
        .round { border-radius: 50%; }
        .arc-f-tl { border-radius: 100% 0 0 0; }
        .arc-f-tr { border-radius: 0 100% 0 0; }
        .arc-f-br { border-radius: 0 0 100% 0; }
        .arc-f-bl { border-radius: 0 0 0 100%; }
        .arc-l { width: 52px !important; height: 52px !important; background: transparent !important; border: 22px solid; box-sizing: border-box; z-index: 10; }
        .m-tl { border-radius: 100% 0 0 0; border-right: none !important; border-bottom: none !important; }
        .m-tr { border-radius: 0 100% 0 0; border-left: none !important; border-bottom: none !important; }
        .m-br { border-radius: 0 0 100% 0; border-left: none !important; border-top: none !important; }
        .m-bl { border-radius: 0 0 0 100%; border-right: none !important; border-top: none !important; }
    </style>
</head>
<body>

    <header class="global-header">
        <a href="#" class="nav-link active">Image Generator</a>
        <a href="LEGO_grille.html" class="nav-link">Texte Generator</a>
    </header>

    <div id="loader-overlay">
        <div class="loading-container" id="loading-grid">
            <div style="position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); color: #444; letter-spacing: 8px; font-size: 12px; text-transform: uppercase;">Studio</div>
        </div>
    </div>

    <div class="toolbar">
        <div class="logo">IMAGE <span>GENERATOR</span></div>
        <div style="position: relative; overflow: hidden;">
            <button class="btn btn-primary">CHARGER IMAGE</button>
            <input type="file" id="upload" accept="image/*" style="position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;">
        </div>
        <div style="margin-left: auto; display: flex; align-items: center; gap: 15px;">
            <select id="algoSelect" style="width: 220px;">
                <option value="threshold">Seuil Net (Géométrique)</option>
                <option value="floyd">Floyd-Steinberg (Photo)</option>
                <option value="bayer">Bayer Grid (Rétro)</option>
                <option value="random">Bruit Aléatoire</option>
                <option value="edges">Contours (Lignes)</option>
            </select>
        </div>
    </div>

    <div class="main-content">
        <div class="settings">
            <div>
                <h3 style="font-size:0.7em; color:var(--text-dim); text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px;">Réglages</h3>
                <div class="control-group">
                    <label>ÉCHELLE <span id="v-scale">100%</span></label>
                    <input type="range" id="scale" min="10" max="300" value="100">
                </div>
                <div class="control-group">
                    <label>LUMINOSITÉ <span id="v-bright">100%</span></label>
                    <input type="range" id="brightness" min="0" max="200" value="100">
                </div>
                <div class="control-group">
                    <label>CONTRASTE <span id="v-contrast">100%</span></label>
                    <input type="range" id="contrast" min="0" max="300" value="100">
                </div>
                <div class="control-group">
                    <label>LISSAGE <span id="v-blur">0px</span></label>
                    <input type="range" id="blur" min="0" max="10" value="0" step="0.5">
                </div>
                <div class="control-group">
                    <label>SENSIBILITÉ <span id="v-threshold">128</span></label>
                    <input type="range" id="threshold" min="0" max="255" value="128">
                </div>
            </div>
            <div>
                <h3 style="font-size:0.7em; color:var(--text-dim); text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px;">Inventaire</h3>
                <div id="stats"></div>
            </div>
        </div>

        <div class="viewer">
            <div>
                <div class="canvas-label">Source</div>
                <canvas id="preCanvas" width="380" height="380"></canvas>
            </div>
            <div>
                <div class="canvas-label">Plaque 48x48</div>
                <canvas id="legoCanvas" width="580" height="580"></canvas>
            </div>
        </div>
    </div>

    <script>
        // --- GESTION DU CHARGEMENT ---
        const legoGridData = [{"x": 0, "y": 0, "shape": "arc-f-tl", "color": "#f72585"},{"x": 4, "y": 0, "shape": "arc-l m-tl", "color": "#4cc9f0"},{"x": 6, "y": 0, "shape": "square", "color": "#f72585"},{"x": 7, "y": 0, "shape": "square", "color": "#f26419"},{"x": 8, "y": 0, "shape": "arc-l m-tl", "color": "#4cc9f0"},{"x": 10, "y": 0, "shape": "square", "color": "#26feac"},{"x": 11, "y": 0, "shape": "square", "color": "#b5179e"},{"x": 12, "y": 0, "shape": "arc-l m-tl", "color": "#f26419"},{"x": 14, "y": 0, "shape": "arc-l m-tr", "color": "#f72585"},{"x": 0, "y": 1, "shape": "square", "color": "#ff5964"},{"x": 0, "y": 2, "shape": "square", "color": "#b5179e"},{"x": 4, "y": 2, "shape": "square", "color": "#35a7ff"},{"x": 5, "y": 2, "shape": "square", "color": "#26feac"},{"x": 6, "y": 2, "shape": "arc-f-br", "color": "#35a7ff"},{"x": 8, "y": 2, "shape": "arc-l m-bl", "color": "#f72585"},{"x": 11, "y": 2, "shape": "square", "color": "#b5179e"},{"x": 12, "y": 2, "shape": "arc-l m-bl", "color": "#35a7ff"},{"x": 14, "y": 2, "shape": "arc-l m-br", "color": "#f72585"},{"x": 0, "y": 3, "shape": "square", "color": "#35a7ff"},{"x": 1, "y": 3, "shape": "square", "color": "#26feac"},{"x": 2, "y": 3, "shape": "square", "color": "#ffe74c"},{"x": 3, "y": 3, "shape": "arc-f-br", "color": "#35a7ff"},{"x": 4, "y": 3, "shape": "square", "color": "#4cc9f0"},{"x": 5, "y": 3, "shape": "square", "color": "#b5179e"},{"x": 6, "y": 3, "shape": "square", "color": "#4cc9f0"},{"x": 7, "y": 3, "shape": "arc-f-br", "color": "#f72585"},{"x": 10, "y": 3, "shape": "square", "color": "#ffe74c"},{"x": 11, "y": 3, "shape": "arc-f-br", "color": "#ffe74c"},{"x": 2, "y": 5, "shape": "square", "color": "#f72585"},{"x": 0, "y": 6, "shape": "arc-l m-tl", "color": "#f26419"},{"x": 2, "y": 6, "shape": "square", "color": "#f72585"},{"x": 4, "y": 6, "shape": "arc-l m-tl", "color": "#f26419"},{"x": 6, "y": 6, "shape": "square", "color": "#4cc9f0"},{"x": 8, "y": 6, "shape": "arc-l m-tl", "color": "#4cc9f0"},{"x": 10, "y": 6, "shape": "square", "color": "#b5179e"},{"x": 12, "y": 6, "shape": "arc-f-tl", "color": "#ff5964"},{"x": 13, "y": 6, "shape": "arc-f-tl", "color": "#4cc9f0"},{"x": 14, "y": 6, "shape": "arc-f-tl", "color": "#f72585"},{"x": 2, "y": 7, "shape": "square", "color": "#ff5964"},{"x": 10, "y": 7, "shape": "square", "color": "#ff5964"},{"x": 12, "y": 7, "shape": "square", "color": "#b5179e"},{"x": 13, "y": 7, "shape": "square", "color": "#b5179e"},{"x": 14, "y": 7, "shape": "square", "color": "#ffe74c"},{"x": 0, "y": 8, "shape": "arc-f-bl", "color": "#f26419"},{"x": 1, "y": 8, "shape": "square", "color": "#f26419"},{"x": 2, "y": 8, "shape": "round", "color": "#35a7ff"},{"x": 4, "y": 8, "shape": "round", "color": "#f72585"},{"x": 8, "y": 8, "shape": "arc-f-bl", "color": "#26feac"},{"x": 9, "y": 8, "shape": "square", "color": "#26feac"},{"x": 10, "y": 8, "shape": "round", "color": "#ff5964"},{"x": 12, "y": 8, "shape": "round", "color": "#f72585"},{"x": 13, "y": 8, "shape": "arc-f-br", "color": "#4cc9f0"},{"x": 14, "y": 8, "shape": "arc-f-br", "color": "#f72585"}];

        const loadingGrid = document.getElementById('loading-grid');
        [...legoGridData].sort(() => Math.random() - 0.5).forEach((data, i) => {
            const dot = document.createElement('div');
            dot.className = `dot ${data.shape}`;
            dot.style.gridColumnStart = data.x + 1;
            dot.style.gridRowStart = data.y + 1;
            if (data.shape.includes('arc-l')) dot.style.borderColor = data.color;
            else dot.style.backgroundColor = data.color;
            dot.style.animationDelay = `${i * 0.08}s`;
            loadingGrid.appendChild(dot);
        });

        setTimeout(() => {
            const overlay = document.getElementById('loader-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.visibility = 'hidden', 1000);
        }, 8000);

        // --- LOGIQUE IMAGE STUDIO ---
        const preCanvas = document.getElementById('preCanvas');
        const preCtx = preCanvas.getContext('2d');
        const legoCanvas = document.getElementById('legoCanvas');
        const legoCtx = legoCanvas.getContext('2d');
        const GRID_SIZE = 48;
        const CELL = legoCanvas.width / GRID_SIZE;
        let imgObj = null;

        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', () => {
                const v = document.getElementById('v-' + (el.id === 'brightness' ? 'bright' : el.id));
                if(v) v.textContent = el.value + (el.id === 'blur' ? 'px' : (el.id === 'threshold' ? '' : '%'));
                if(imgObj) process();
            });
        });

        document.getElementById('upload').addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = ev => { imgObj = new Image(); imgObj.onload = process; imgObj.src = ev.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        });

        function process() {
            preCtx.clearRect(0, 0, preCanvas.width, preCanvas.height);
            preCtx.filter = `brightness(${document.getElementById('brightness').value}%) contrast(${document.getElementById('contrast').value}%) blur(${document.getElementById('blur').value}px) grayscale(100%)`;
            const s = document.getElementById('scale').value / 100;
            const r = imgObj.width / imgObj.height;
            let dw = r > 1 ? preCanvas.width * s : (preCanvas.height * s) * r;
            let dh = r > 1 ? (preCanvas.width * s) / r : preCanvas.height * s;
            preCtx.drawImage(imgObj, (preCanvas.width-dw)/2, (preCanvas.height-dh)/2, dw, dh);

            const off = document.createElement('canvas'); off.width = off.height = GRID_SIZE;
            const oCtx = off.getContext('2d'); oCtx.drawImage(preCanvas, 0, 0, GRID_SIZE, GRID_SIZE);
            const imgData = oCtx.getImageData(0, 0, GRID_SIZE, GRID_SIZE);
            const mode = document.getElementById('algoSelect').value;
            const t = parseInt(document.getElementById('threshold').value);
            let grid;

            if(mode === 'threshold') grid = algoThreshold(imgData.data, t);
            else if(mode === 'floyd') grid = algoFloyd(imgData, t);
            else if(mode === 'bayer') grid = algoBayer(imgData.data);
            else if(mode === 'random') grid = algoRandom(imgData.data, t);
            else grid = algoEdges(imgData.data, t);
            renderLego(grid);
        }

        // ALGORITHMES
        function algoThreshold(data, t) {
            let g = Array.from({length:GRID_SIZE},()=>Array(GRID_SIZE).fill(0));
            for(let i=0; i<data.length; i+=4) g[Math.floor((i/4)/GRID_SIZE)][(i/4)%GRID_SIZE] = data[i] < t ? 1 : 0;
            return g;
        }

        function algoFloyd(imgData, t) {
            let d = new Float32Array(imgData.data.length/4);
            for(let i=0; i<imgData.data.length; i+=4) d[i/4] = imgData.data[i];
            let g = Array.from({length:GRID_SIZE},()=>Array(GRID_SIZE).fill(0));
            for(let y=0; y<GRID_SIZE; y++) {
                for(let x=0; x<GRID_SIZE; x++) {
                    let oldP = d[y*GRID_SIZE+x], newP = oldP < t ? 0 : 255;
                    g[y][x] = newP === 0 ? 1 : 0;
                    let err = oldP - newP;
                    if(x<GRID_SIZE-1) d[y*GRID_SIZE+(x+1)] += err*7/16;
                    if(y<GRID_SIZE-1){
                        if(x>0) d[(y+1)*GRID_SIZE+(x-1)] += err*3/16;
                        d[(y+1)*GRID_SIZE+x] += err*5/16;
                        if(x<GRID_SIZE-1) d[(y+1)*GRID_SIZE+(x+1)] += err*1/16;
                    }
                }
            }
            return g;
        }

        function algoBayer(data) {
            const matrix = [[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
            let g = Array.from({length:GRID_SIZE},()=>Array(GRID_SIZE).fill(0));
            for(let i=0; i<data.length; i+=4) {
                let x = (i/4)%GRID_SIZE, y = Math.floor((i/4)/GRID_SIZE);
                g[y][x] = (data[i]/16) < matrix[y%4][x%4] ? 1 : 0;
            }
            return g;
        }

        function algoRandom(data, t) {
            let g = Array.from({length:GRID_SIZE},()=>Array(GRID_SIZE).fill(0));
            for(let i=0; i<data.length; i+=4) g[Math.floor((i/4)/GRID_SIZE)][(i/4)%GRID_SIZE] = data[i] < (Math.random()*255) ? 1 : 0;
            return g;
        }

        function algoEdges(data, t) {
            let g = Array.from({length:GRID_SIZE},()=>Array(GRID_SIZE).fill(0));
            for(let y=1; y<GRID_SIZE-1; y++) {
                for(let x=1; x<GRID_SIZE-1; x++) {
                    let idx = (y*GRID_SIZE+x)*4;
                    let diff = Math.abs(data[idx] - data[idx+4]) + Math.abs(data[idx] - data[(y+1)*GRID_SIZE*4 + x*4]);
                    g[y][x] = diff > (t/2) ? 1 : 0;
                }
            }
            return g;
        }

        function renderLego(grid) {
            legoCtx.clearRect(0,0,legoCanvas.width, legoCanvas.height);
            let used = Array.from({length:GRID_SIZE},()=>Array(GRID_SIZE).fill(false));
            let c = { h2:0, q1:0, r1:0, s1:0 };
            for(let y=0; y<GRID_SIZE-1; y++) {
                for(let x=0; x<GRID_SIZE-1; x++) {
                    if(!used[y][x] && !used[y+1][x] && !used[y][x+1] && !used[y+1][x+1]) {
                        const b = [grid[y][x], grid[y][x+1], grid[y+1][x], grid[y+1][x+1]];
                        if(b.reduce((a,b)=>a+b) === 3) {
                            drawHollow2x2(x, y, b.indexOf(0));
                            used[y][x]=used[y+1][x]=used[y][x+1]=used[y+1][x+1]=true;
                            c.h2++;
                        }
                    }
                }
            }
            for(let y=0; y<GRID_SIZE; y++) {
                for(let x=0; x<GRID_SIZE; x++) {
                    if(grid[y][x] && !used[y][x]) {
                        const n = getNeighbors(grid,x,y);
                        if(n.count===0){ drawRound(x,y); c.r1++; }
                        else if(n.isCorner){ drawQuarter1x1(x,y,n.dir); c.q1++; }
                        else { drawSquare(x,y); c.s1++; }
                    }
                }
            }
            document.getElementById('stats').innerHTML = `
                <div class="inventory-card"><span>Arche 2x2</span><b>${c.h2}</b></div>
                <div class="inventory-card"><span>Quart 1x1</span><b>${c.q1}</b></div>
                <div class="inventory-card"><span>Rond 1x1</span><b>${c.r1}</b></div>
                <div class="inventory-card"><span>Carré 1x1</span><b>${c.s1}</b></div>`;
        }

        function drawHollow2x2(x,y,i){
            legoCtx.save(); legoCtx.translate(x*CELL,y*CELL);
            let cx=[CELL*2,0,CELL*2,0][i], cy=[CELL*2,CELL*2,0,0][i], s=[Math.PI,Math.PI*1.5,Math.PI*0.5,0][i];
            legoCtx.lineWidth=CELL; legoCtx.strokeStyle="#1a1a1a"; legoCtx.beginPath();
            legoCtx.arc(cx,cy,CELL*1.5,s,s+Math.PI/2); legoCtx.stroke(); legoCtx.restore();
        }
        function drawQuarter1x1(x,y,d){
            legoCtx.save(); legoCtx.translate(x*CELL,y*CELL); legoCtx.fillStyle="#1a1a1a"; legoCtx.beginPath();
            if(d=="BR"){legoCtx.moveTo(0,0);legoCtx.arc(0,0,CELL,0,Math.PI/2);}
            else if(d=="BL"){legoCtx.moveTo(CELL,0);legoCtx.arc(CELL,0,CELL,Math.PI/2,Math.PI);}
            else if(d=="TR"){legoCtx.moveTo(0,CELL);legoCtx.arc(0,CELL,CELL,Math.PI*1.5,0);}
            else {legoCtx.moveTo(CELL,CELL);legoCtx.arc(CELL,CELL,CELL,Math.PI,Math.PI*1.5);}
            legoCtx.fill(); legoCtx.restore();
        }
        function drawSquare(x,y){legoCtx.fillStyle="#1a1a1a"; legoCtx.fillRect(x*CELL+0.5,y*CELL+0.5,CELL-1,CELL-1);}
        function drawRound(x,y){legoCtx.fillStyle="#1a1a1a"; legoCtx.beginPath(); legoCtx.arc(x*CELL+CELL/2,y*CELL+CELL/2,CELL/2-2,0,Math.PI*2); legoCtx.fill();}
        function getNeighbors(g,x,y){
            let t=y>0?g[y-1][x]:0, b=y<GRID_SIZE-1?g[y+1][x]:0, l=x>0?g[y][x-1]:0, r=x<GRID_SIZE-1?g[y][x+1]:0;
            let d = (b&&r)?"BR":(b&&l)?"BL":(t&&r)?"TR":"TL";
            return { count: t+b+l+r, isCorner: (t+b+l+r===2 && !((t&&b)||(l&&r))), dir: d };
        }
    </script>
</body>
</html>
